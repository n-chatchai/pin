{% if rows %}
<table>
  <thead><tr>{% for k in rows[0].keys() %}<th>{{ k }}</th>{% endfor %}</tr></thead>
  <tbody>
    {% for r in rows %}
    <tr>{% for k,v in r.items() %}
      <td class="{{ 'mono' if k in ('url','arg_keys','ts') else '' }}">{{ v }}</td>
    {% endfor %}</tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p style="color:var(--ink3);padding:20px 4px">ยังไม่มีข้อมูลใน "{{ tab }}"</p>
{% endif %}
