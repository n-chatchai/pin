{% if mine %}
<table>
  <thead><tr><th>ชื่อ</th><th>ชนิด</th><th>สถานะ</th></tr></thead>
  <tbody>{% for s in mine %}
    <tr style="cursor:pointer" hx-get="/developers/sub/{{ s.id }}" hx-target="#detail">
        <td class="tname">{{ s.name }}</td>
        <td><span class="b sub">{{ s.type }}</span></td>
        <td><span class="b {{ 'on' if s.status=='approved' else ('off' if s.status=='rejected' else 'warn') }}">{{ s.status }}</span></td></tr>
  {% endfor %}</tbody>
</table>
{% else %}<p style="color:var(--ink3)">ยังไม่ได้ส่งอะไร</p>{% endif %}
