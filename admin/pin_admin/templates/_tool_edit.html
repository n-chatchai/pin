<div class="sec-h"><h3>แก้ไข · {{ r.name }}</h3>
  <a class="tg" hx-get="/admin/tab/tools" hx-target="#panel">← กลับ</a></div>
<form hx-post="/admin/tool/{{ r.name }}" hx-target="#panel"
      style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px;max-width:560px">
  <style>
    .fld{margin-bottom:14px}
    .fld label{display:block;font-size:12px;color:var(--ink2);margin-bottom:5px;font-weight:600}
    .fld input,.fld select{width:100%;padding:8px 11px;border:1px solid var(--line2);border-radius:7px;font-family:var(--th);font-size:13.5px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  </style>
  <div class="fld"><label>ชื่อที่ผู้ใช้เห็น (label)</label>
    <input name="label" value="{{ r.label or '' }}" placeholder="เช่น พยากรณ์อากาศ"></div>
  <div class="fld"><label>คำอธิบายสั้น (blurb)</label>
    <input name="blurb" value="{{ r.blurb or '' }}" placeholder="เช่น บอกอากาศแต่ละเมือง"></div>
  <div class="row2">
    <div class="fld"><label>หมวด (category)</label>
      <input name="category" value="{{ r.category or '' }}" placeholder="เช่น ข้อมูล"></div>
    <div class="fld"><label>ผู้ให้บริการ (provider)</label>
      <input name="provider" value="{{ r.provider or '' }}" placeholder="เช่น Google"></div>
  </div>
  <div class="row2">
    <div class="fld"><label>ราคา (tier)</label>
      <select name="tier">
        <option value="free" {{ 'selected' if pricing.get('tier')=='free' or not pricing }}>ฟรี</option>
        <option value="onetime" {{ 'selected' if pricing.get('tier')=='onetime' }}>ซื้อครั้งเดียว</option>
        <option value="subscription" {{ 'selected' if pricing.get('tier')=='subscription' }}>สมัครรายเดือน/ปี</option>
      </select></div>
    <div class="fld"><label>จำนวน (บาท)</label>
      <input name="amount" value="{{ pricing.get('amount','') }}" placeholder="0" inputmode="numeric"></div>
  </div>
  <div class="fld"><label>รอบ (subscription)</label>
    <select name="period">
      <option value="month" {{ 'selected' if pricing.get('period','month')=='month' }}>เดือน</option>
      <option value="year" {{ 'selected' if pricing.get('period')=='year' }}>ปี</option>
    </select></div>
  <button class="btn p" type="submit">บันทึก</button>
</form>
