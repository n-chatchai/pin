apiVersion: apps/v1
kind: Deployment
metadata:
  name: pin-backend
  namespace: pin
  labels:
    app: pin-backend
spec:
  replicas: 1
  strategy:
    # Zero-downtime: bring the new pod up + Ready BEFORE the old is removed
    # (maxUnavailable:0). SQLite WAL + busy_timeout tolerates the brief two-pod
    # overlap on the same DB (writes serialize; reads concurrent). Single-node
    # k3s → both pods mount the RWO PVC on the same node.
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: pin-backend
  template:
    metadata:
      labels:
        app: pin-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/n-chatchai/pin-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8088
              name: http

          # Gate traffic on /health so a rollout only shifts to the new pod once
          # it's serving; the old pod keeps taking traffic until then.
          startupProbe:
            httpGet: { path: /health, port: 8088 }
            periodSeconds: 2
            failureThreshold: 20 # up to ~40s for pyo3/markitdown + DB init
          readinessProbe:
            httpGet: { path: /health, port: 8088 }
            periodSeconds: 5
            timeoutSeconds: 3

          env:
            - name: RUST_LOG
              value: info

          # Automatically injects all keys/values from your .env secret as env vars
          envFrom:
            - secretRef:
                name: pin-secrets
              
          volumeMounts:
            - name: data-volume
              mountPath: /data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: pin-backend-pvc
