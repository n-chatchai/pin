apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pin-backend-ingress
  namespace: pin
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    # Canonical single host: proxy at /, admin UI under /admin.
    - host: pin-backend.tokens2.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pin-backend-svc
                port:
                  number: 8088
    # Compat alias for already-shipped app installs still pointing at pin-gateway
    # (old lib/agent/agent_config.dart default). Retire once all clients update.
    - host: pin-gateway.tokens2.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pin-backend-svc
                port:
                  number: 8088
  tls:
    - hosts:
        - pin-backend.tokens2.io
        - pin-gateway.tokens2.io
      secretName: pin-backend-tls
