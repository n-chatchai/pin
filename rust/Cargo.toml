[package]
name = "rust_lib_pin"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"
matrix-sdk = { version = "0.18", default-features = false, features = [
    "e2e-encryption",
    "sqlite",
    "bundled-sqlite",
    "automatic-room-key-forwarding",
] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "net"] }
once_cell = "1"
anyhow = "1"
mime = "0.3"
serde_json = "1"

# DEBUG-only in-process forwarding proxy used to inspect Matrix HTTP traffic.
# Versions pinned to what matrix-sdk already resolves (hyper 1.x, http-body-util
# 0.1, reqwest 0.13) so no extra copies enter the tree. reqwest uses the SAME
# `rustls` feature matrix-sdk enables (rustls-platform-verifier) → one TLS stack.
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["server-auto", "tokio"] }
http-body-util = "0.1"
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
