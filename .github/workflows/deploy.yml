name: Build & Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend-rust/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pin-backend

jobs:
  build-and-push:
    name: Build Docker Image & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-rust
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s (VPS)
    needs: build-and-push
    # Push builds+pushes the image only; the prod rollout runs on explicit
    # manual dispatch so route/secret prep can happen first (see k8s/caddy_to_traefik_migration.md).
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            # k3s kubeconfig is root-only; the deploy user has its own copy here.
            export KUBECONFIG=$HOME/.kube/config

            # Sync manifests to a writable repo dir (deploy user can't touch /opt).
            REPO=$HOME/pin-repo
            git clone https://github.com/${{ github.repository }} "$REPO" 2>/dev/null || true
            cd "$REPO" && git fetch origin && git reset --hard origin/main

            kubectl create namespace pin --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -f k8s/pvc.yaml
            kubectl apply -f k8s/service.yaml
            kubectl apply -f k8s/ingress.yaml
            kubectl apply -f k8s/deployment.yaml

            # imagePullPolicy: Always -> restart pulls the freshly-pushed :latest.
            kubectl rollout restart deployment/pin-backend -n pin
            kubectl rollout status deployment/pin-backend -n pin --timeout=120s
