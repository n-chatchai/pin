name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    name: Cargo Check & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev python3-dev

      - name: Install python packages
        run: |
          python -m pip install --upgrade pip
          pip install markitdown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            backend-rust -> target

      - name: Check code formatting
        run: cargo fmt --manifest-path backend-rust/Cargo.toml --all -- --check

      - name: Compile and check types
        run: cargo check --manifest-path backend-rust/Cargo.toml

      - name: Run clippy linter
        run: cargo clippy --manifest-path backend-rust/Cargo.toml -- -D warnings
