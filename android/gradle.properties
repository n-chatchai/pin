org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# R8 full mode (AGP 8 default) errors on optional missing classes referenced by
# flutter_local_notifications. We don't ship a shrunk build, so drop to non-full
# mode → missing refs are warnings, not build failures.
android.enableR8.fullMode=false
